<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF6A3D">
    <link rel="icon" href="/voice_agent.ico" type="image/x-icon">
    <title>CushLabs AI Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cush-orange: #FF6A3D;
            --cush-black: #000000;
            --cush-gray-900: #0A0A0A;
            --cush-gray-800: #141414;
            --cush-gray-700: #1A1A1A;
            --cush-gray-400: #666666;
            --cush-gray-300: #888888;
            --cush-gray-200: #AAAAAA;
            --color-orange-glow: rgba(255, 106, 61, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ::selection {
            background-color: var(--cush-orange);
            color: var(--cush-black);
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: "Source Serif 4", Georgia, serif;
            background: var(--cush-black);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Aurora background */
        .aurora-container {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .aurora-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.12;
        }

        .aurora-orb-1 {
            width: 600px;
            height: 600px;
            background: var(--cush-orange);
            top: -15%;
            right: -10%;
            animation: aurora-1 22s ease-in-out infinite;
        }

        .aurora-orb-2 {
            width: 500px;
            height: 500px;
            background: var(--cush-orange);
            bottom: -20%;
            left: -10%;
            animation: aurora-2 25s ease-in-out infinite;
        }

        .aurora-orb-3 {
            width: 350px;
            height: 350px;
            background: #ff8c66;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            animation: aurora-1 20s ease-in-out infinite reverse;
        }

        @keyframes aurora-1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        @keyframes aurora-2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-40px, 20px) scale(0.9); }
            66% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* Content */
        .hero {
            text-align: center;
            max-width: 720px;
            padding: 2rem;
            position: relative;
            z-index: 1;
            animation: fade-in-up 0.8s ease-out;
        }

        .hero-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            border-radius: 1rem;
            object-fit: contain;
        }

        .hero h1 {
            font-family: "Space Grotesk", sans-serif;
            font-size: 3.2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .hero h1 span {
            color: var(--cush-orange);
        }

        .hero p.tagline {
            font-family: "Source Serif 4", Georgia, serif;
            font-size: 1.2rem;
            color: var(--cush-gray-200);
            line-height: 1.8;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* Voice button */
        .voice-btn {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            border: none;
            background: var(--cush-orange);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 24px rgba(255, 106, 61, 0.25);
            position: relative;
        }

        .voice-btn:hover:not(:disabled) {
            transform: scale(1.06);
            box-shadow: 0 0 36px rgba(255, 106, 61, 0.4);
        }

        .voice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .voice-btn.active {
            background: #ef4444;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
        }

        /* Breathing ring */
        .voice-btn::before {
            content: "";
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid var(--cush-orange);
            opacity: 0;
            animation: breathe 4s ease-in-out infinite;
        }

        .voice-btn.active::before {
            border-color: #ef4444;
            animation: breathe-active 1.5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.15); }
        }

        @keyframes breathe-active {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .voice-btn svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        .status-text {
            font-family: "Space Grotesk", sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--cush-gray-300);
            min-height: 1.5em;
            transition: color 0.3s;
        }

        .status-text.active {
            color: #ef4444;
        }

        .status-text.ready {
            color: var(--cush-orange);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 1.5rem;
            font-family: "Space Grotesk", sans-serif;
            color: var(--cush-gray-400);
            font-size: 0.8rem;
            z-index: 1;
        }

        .footer a {
            color: var(--cush-orange);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #ff8c66;
        }

        /* Animations */
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .aurora-orb { animation: none !important; }
            .voice-btn::before { animation: none !important; opacity: 0.3; }
            .hero { animation: none !important; opacity: 1; }
        }

        @media (max-width: 640px) {
            .hero h1 { font-size: 2.2rem; }
            .hero p.tagline { font-size: 1.05rem; }
            .voice-btn { width: 72px; height: 72px; }
            .voice-btn svg { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>
    <!-- Aurora background -->
    <div class="aurora-container">
        <div class="aurora-orb aurora-orb-1"></div>
        <div class="aurora-orb aurora-orb-2"></div>
        <div class="aurora-orb aurora-orb-3"></div>
    </div>

    <div class="hero">
        <img src="/images/voice_agent_logo.png" alt="CushLabs AI Voice Agent" class="hero-logo">
        <h1>Cush<span>Labs</span> AI</h1>
        <p class="tagline">
            AI integration and software development consulting for small businesses.
            Talk to our AI assistant to explore how we can help.
        </p>

        <button class="voice-btn" id="voiceBtn" disabled>
            <svg id="micIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
            <svg id="stopIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none;">
                <rect x="6" y="6" width="12" height="12" rx="2"/>
            </svg>
        </button>
        <p class="status-text" id="statusText">Loading...</p>
    </div>

    <div class="footer">
        &copy; 2026 <a href="https://cushlabs.ai">CushLabs AI Services</a>
    </div>

    <!-- Vapi Web SDK (ESM) -->
    <script type="module">
        import VapiModule from "https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/+esm";
        const Vapi = VapiModule.default || VapiModule;

        const voiceBtn = document.getElementById("voiceBtn");
        const micIcon = document.getElementById("micIcon");
        const stopIcon = document.getElementById("stopIcon");
        const statusText = document.getElementById("statusText");
        let vapi = null;
        let isCallActive = false;
        let assistantId = null;

        async function initVapi() {
            try {
                const res = await fetch("/api/config");
                const config = await res.json();
                assistantId = config.assistantId;

                vapi = new Vapi(config.publicKey);

                vapi.on("call-start", () => {
                    isCallActive = true;
                    voiceBtn.classList.add("active");
                    micIcon.style.display = "none";
                    stopIcon.style.display = "block";
                    statusText.textContent = "Listening... click to end call";
                    statusText.className = "status-text active";
                });

                vapi.on("call-end", () => {
                    isCallActive = false;
                    voiceBtn.classList.remove("active");
                    micIcon.style.display = "block";
                    stopIcon.style.display = "none";
                    statusText.textContent = "Call ended — click to start again";
                    statusText.className = "status-text ready";
                });

                vapi.on("error", (error) => {
                    console.error("[CushLabs] Vapi error:", error);
                    statusText.textContent = "Something went wrong. Try again.";
                    statusText.className = "status-text";
                    isCallActive = false;
                    voiceBtn.classList.remove("active");
                    micIcon.style.display = "block";
                    stopIcon.style.display = "none";
                });

                vapi.on("speech-start", () => {
                    if (isCallActive) statusText.textContent = "Assistant speaking...";
                });

                vapi.on("speech-end", () => {
                    if (isCallActive) statusText.textContent = "Listening...";
                });

                voiceBtn.disabled = false;
                statusText.textContent = "Click to talk with our AI assistant";
                statusText.className = "status-text ready";

            } catch (err) {
                console.error("[CushLabs] Failed to initialize:", err);
                statusText.textContent = "Failed to load. Please refresh.";
            }
        }

        voiceBtn.addEventListener("click", async () => {
            if (!vapi) return;

            if (isCallActive) {
                vapi.stop();
            } else {
                statusText.textContent = "Connecting...";
                voiceBtn.disabled = true;
                try {
                    await vapi.start(assistantId);
                } catch (err) {
                    console.error("[CushLabs] Failed to start call:", err);
                    statusText.textContent = "Failed to connect. Try again.";
                    statusText.className = "status-text";
                }
                voiceBtn.disabled = false;
            }
        });

        initVapi();
    </script>
</body>
</html>
